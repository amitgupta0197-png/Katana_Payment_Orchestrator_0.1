<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="fGlow" cx="82%" cy="14%" r="55%">
      <stop offset="0%" stop-color="#e0455c" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#e0455c" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fGlow2" cx="8%" cy="92%" r="50%">
      <stop offset="0%" stop-color="#5b8cff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fBlade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b7f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5b8cff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#fGlow)"/>
  <rect width="1600" height="1000" fill="url(#fGlow2)"/>
  <!-- faint katana blade sweeping across -->
  <g opacity="0.09" stroke="url(#fBlade)" fill="none" stroke-linecap="round">
    <line x1="1180" y1="-40" x2="360" y2="1080" stroke-width="34"/>
    <line x1="1230" y1="-30" x2="410" y2="1090" stroke-width="3"/>
  </g>
  <!-- katana guard + handle hint bottom-left -->
  <g opacity="0.10" stroke="#ff8a9b" fill="none" stroke-width="4">
    <line x1="300" y1="980" x2="470" y2="820"/>
    <ellipse cx="360" cy="905" rx="34" ry="14" transform="rotate(-43 360 905)"/>
  </g>
  <!-- diagonal shards -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="2">
    <line x1="0" y1="220" x2="520" y2="-60"/>
    <line x1="1080" y1="1060" x2="1600" y2="700"/>
  </g>
</svg>
